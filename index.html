<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Karavan</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f14;
    }

    /* ===== HERO ===== */
    .hero {
      position: relative;
      width: 100%;
      height: 100svh;
      background: url('desktop.png') no-repeat center center/cover;
    }

    /* Overlay */
    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
    }

    /* ===== BUTON PANEL ===== */
    .buttons-wrap {
      position: absolute;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 600px;
      z-index: 3;
    }

    .buttons-panel {
      display: flex;
      gap: 12px;
      padding: 12px;
      border-radius: 22px;
      background: rgba(255,255,255,0.10);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
    }

    /* ===== BUTON ===== */
    .btn {
      flex: 1;
      text-align: center;
      padding: 16px;
      border-radius: 16px;
      text-decoration: none;
      font-size: 17px;
      font-weight: bold;
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    /* WhatsApp */
    .whatsapp {
      background: #25D366;
    }

    /* Ara */
    .call {
      background: #C1121F;
    }

    /* ===== ALT YAZI ===== */
    .bottom-note {
      text-align: center;
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }

    /* ===== MOBİL GÖRSEL ===== */
    @media (max-width: 768px) {
      .hero {
        background: url('mobile.png') no-repeat center center/cover;
      }

      .buttons-panel {
        flex-direction: column;
      }

      .btn {
        font-size: 16px;
        padding: 14px;
      }
    }

  </style>
</head>

<body>

  <div class="hero">

    <div class="buttons-wrap">
      <div class="buttons-panel">

        <a class="btn whatsapp" href="https://wa.me/905325664290" target="_blank">
          WhatsApp
        </a>

        <a class="btn call" href="tel:+905325664290">
          Ara
        </a>

      </div>

      <div class="bottom-note">
        Universal Karavan • Çok yakında yayında
      </div>
    </div>

  </div>

</body>
</html>
