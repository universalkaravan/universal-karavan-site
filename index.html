<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universal Karavan</title>

<style>
body {
  margin: 0;
}

/* Arka plan */
.hero {
  width: 100%;
  height: 100vh;
  background: url('arkaplan.png') no-repeat center center/cover;
  position: relative;
}

/* Overlay (isteğe bağlı) */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
}

/* Buton container */
.buttons {
  position: absolute;
  bottom: 60px;
  left: 60px;
  display: flex;
  gap: 15px;
  z-index: 2;
}

/* Ortak buton stil */
.btn {
  padding: 16px 28px;
  border-radius: 14px;
  text-decoration: none;
  font-size: 18px;
  font-weight: bold;
  transition: 0.3s;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

/* WhatsApp */
.whatsapp {
  background: #25D366;
  color: white;
}

.whatsapp:hover {
  background: #1ebe5d;
  transform: scale(1.05);
}

/* Ara */
.call {
  background: #C1121F;
  color: white;
}

.call:hover {
  background: #e63946;
  transform: scale(1.05);
}

/* Mobil */
@media (max-width: 768px) {
  .buttons {
    left: 20px;
    right: 20px;
    bottom: 30px;
    flex-direction: column;
  }

  .btn {
    text-align: center;
  }
}
</style>

</head>
<body>

<div class="hero">

  <div class="buttons">
    <a class="btn whatsapp" href="https://wa.me/905325664290" target="_blank">
      WhatsApp
    </a>

    <a class="btn call" href="tel:+905325664290">
      Ara
    </a>
  </div>
</div>

</body>
</html>
