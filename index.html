<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universal Karavan</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      background: url('arkaplan.png') no-repeat center center/cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
    }

    .content {
      position: absolute;
      left: 60px;
      top: 50%;
      transform: translateY(-50%);
      max-width: 650px;
      color: white;
      z-index: 2;
    }

    .label {
      font-size: 18px;
      letter-spacing: 3px;
      color: #d1d5db;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 20px 0;
      font-size: 72px;
      line-height: 0.95;
      text-transform: uppercase;
    }

    .red {
      color: #c1121f;
    }

    .text {
      font-size: 24px;
      line-height: 1.5;
      color: #f3f4f6;
      margin-bottom: 30px;
    }

    .btn {
      display: inline-block;
      background: #c1121f;
      color: white;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 14px;
      font-size: 20px;
      font-weight: bold;
      transition: 0.3s ease;
      box-shadow: 0 10px 30px rgba(193, 18, 31, 0.35);
    }

    .btn:hover {
      transform: scale(1.04);
      background: #e63946;
    }

    @media (max-width: 768px) {
      .content {
        left: 24px;
        right: 24px;
        max-width: none;
      }

      h1 {
        font-size: 42px;
      }

      .text {
        font-size: 18px;
      }

      .btn {
        font-size: 18px;
        padding: 14px 24px;
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="overlay"></div>

    <div class="content">
      <div class="label">YAKINDA YAYINDAYIZ</div>

      <h1>
        Özgürlüğe Giden Yolda<br>
        <span class="red">Doğru Adım</span>
      </h1>

      <div class="text">
        Sizin için daha güçlü, daha modern ve daha özgür karavan çözümleri hazırlıyoruz.
        Yeni web sitemiz çok yakında yayında.
      </div>

      <a class="btn" href="https://wa.me/905325664290" target="_blank">
        Bize Ulaşın
      </a>
    </div>
  </section>
</body>
</html>
